name: Make Public Repos Private

on:
  workflow_dispatch:

jobs:
  make-private:
    runs-on: ubuntu-latest

    steps:
      - name: Make all public repos private
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          gh repo list ${{ github.repository_owner }} \
            --visibility public \
            --limit 200 \
            --json nameWithOwner \
            --jq '.[].nameWithOwner' |
          while read repo; do
            echo "Making $repo private..."
            gh repo edit "$repo" --visibility private
          done
